{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="preload" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css"></noscript>

<!-- Support for Font Awesome -->
 <link rel="preload" href="{{ base_path }}/assets/css/fontawesome.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.css"></noscript>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="var(--global-bg-color)"/>

<style>
  .lbk-hero {
    padding: 0.5rem 0 2rem;
  }

  .lbk-hero h1 {
    margin-bottom: 0.5rem;
    font-size: clamp(2.4rem, 7vw, 4.8rem);
    line-height: 1.02;
  }

  .lbk-eyebrow {
    margin-bottom: 0.6rem;
    color: #8f2d2d;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .lbk-lede {
    color: #315f7d;
    font-size: clamp(1.2rem, 2.2vw, 1.55rem);
    font-weight: 700;
    line-height: 1.45;
  }

  .lbk-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    min-width: 14rem;
    min-height: 3rem;
    margin-top: 1rem;
    padding: 0 1rem;
    border: 1px solid #1f2933;
    border-radius: 0.35rem;
    background: #1f2933;
    color: #fff;
    cursor: pointer;
    font-weight: 700;
  }

  .lbk-toggle:hover {
    background: #5f1e1e;
    border-color: #5f1e1e;
  }

  .lbk-toggle span[aria-hidden="true"] {
    display: grid;
    place-items: center;
    width: 1.75rem;
    height: 1.75rem;
    border: 1px solid rgba(255, 255, 255, 0.45);
    border-radius: 999px;
  }

  .lbk-home,
  .lbk-cv {
    border-top: 1px solid var(--global-border-color);
  }

  .lbk-home.is-open,
  .lbk-cv.is-open {
    animation: lbkReveal 360ms ease both;
  }

  @keyframes lbkReveal {
    from {
      opacity: 0;
      transform: translateY(0.75rem);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .lbk-section,
  .lbk-cv-gate {
    padding: 2.25rem 0;
    border-bottom: 1px solid var(--global-border-color);
  }

  .lbk-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.55rem;
    margin: 1.2rem 0 0;
    padding: 0;
    list-style: none;
  }

  .lbk-tags li {
    padding: 0.4rem 0.65rem;
    border: 1px solid var(--global-border-color);
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 700;
  }

  .lbk-link-grid,
  .lbk-work-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.75rem;
  }

  .lbk-link-grid a,
  .lbk-work-list article {
    display: grid;
    gap: 0.25rem;
    min-height: 4.8rem;
    padding: 1rem;
    border: 1px solid var(--global-border-color);
    border-radius: 0.4rem;
    background: var(--global-bg-color);
    text-decoration: none;
  }

  .lbk-link-grid a:hover {
    border-color: #8f2d2d;
  }

  .lbk-link-grid span,
  .lbk-work-list p {
    color: var(--global-text-color-light);
    font-size: 0.9rem;
  }

  .lbk-statement p:not(.lbk-eyebrow) {
    font-size: clamp(1.05rem, 1.8vw, 1.35rem);
    line-height: 1.65;
  }

  .lbk-work-list article span,
  .lbk-cv-item strong {
    color: #315f7d;
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
  }

  .lbk-cv-gate {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .lbk-toggle-secondary {
    margin-top: 0;
    background: #8f2d2d;
    border-color: #8f2d2d;
  }

  .lbk-cv {
    padding-top: 2.25rem;
  }

  .lbk-cv-item {
    display: grid;
    grid-template-columns: 9rem minmax(0, 1fr);
    gap: 1.25rem;
    padding: 1.25rem 0;
    border-bottom: 1px solid var(--global-border-color);
  }

  .lbk-cv-item time {
    color: #8f2d2d;
    font-weight: 800;
  }

  [hidden] {
    display: none !important;
  }

  @media (max-width: 640px) {
    .lbk-link-grid,
    .lbk-work-list,
    .lbk-cv-item {
      grid-template-columns: 1fr;
    }

    .lbk-cv-gate {
      align-items: stretch;
      flex-direction: column;
    }

    .lbk-toggle {
      width: 100%;
    }
  }
</style>

<!-- end custom head snippets -->
